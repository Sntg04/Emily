<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitacion a comer</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700&display=swap");

    :root {
      --bg-a: #ffe3c2;
      --bg-b: #ffaf87;
      --card: #fffaf4;
      --ink: #2f1f18;
      --accent: #ff5a5f;
      --accent-2: #ff9f1c;
      --ok: #2ec4b6;
      --shadow: 0 20px 50px rgba(110, 50, 25, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 8% 20%, rgba(255, 255, 255, 0.5), transparent 35%),
        radial-gradient(circle at 88% 12%, rgba(255, 231, 175, 0.4), transparent 40%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      font-family: "Nunito", sans-serif;
      color: var(--ink);
    }

    .blob {
      position: fixed;
      z-index: 0;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.45;
      animation: drift 10s ease-in-out infinite;
      pointer-events: none;
    }

    .blob.a {
      width: 220px;
      height: 220px;
      left: -50px;
      top: -40px;
      background: #ffd8a8;
    }

    .blob.b {
      width: 180px;
      height: 180px;
      right: -50px;
      bottom: 12%;
      animation-delay: -3s;
      background: #ffc6b6;
    }

    .blob.c {
      width: 130px;
      height: 130px;
      right: 25%;
      top: 12%;
      animation-delay: -5s;
      background: #ffeaa7;
    }

    @keyframes drift {
      0%,
      100% {
        transform: translateY(0px) translateX(0px);
      }
      50% {
        transform: translateY(-14px) translateX(10px);
      }
    }

    .card {
      width: min(720px, 100%);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.97), rgba(255, 250, 244, 0.95));
      border: 1px solid rgba(255, 120, 80, 0.25);
      border-radius: 28px;
      padding: 30px 22px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 2;
      animation: card-enter 800ms cubic-bezier(0.2, 0.8, 0.25, 1) both;
      backdrop-filter: blur(2px);
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .seal {
      width: 66px;
      height: 66px;
      border-radius: 999px;
      margin: 0 auto 14px;
      background: linear-gradient(145deg, #ff7f7f, #ff4d6d);
      display: grid;
      place-items: center;
      color: white;
      font-size: 30px;
      box-shadow: 0 10px 20px rgba(255, 77, 109, 0.35);
      transform: rotate(-8deg);
    }

    h1 {
      margin: 0;
      text-align: center;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.85rem, 6vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 14px auto 18px;
      text-align: center;
      max-width: 52ch;
      font-size: clamp(1rem, 3.5vw, 1.15rem);
      color: #5d4033;
    }

    .name {
      color: var(--accent);
      font-weight: 800;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 8px 0 14px;
    }

    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      background: #fff;
      border: 1px solid rgba(255, 90, 95, 0.3);
      box-shadow: 0 4px 10px rgba(255, 120, 80, 0.12);
    }

    .hint {
      text-align: center;
      margin: 0 0 20px;
      color: #6f4d3f;
      font-size: 0.95rem;
    }

    .cta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0 auto;
      width: min(480px, 100%);
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
      box-shadow: 0 10px 16px rgba(0, 0, 0, 0.12);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), #ff7f50);
    }

    .btn-secondary {
      color: white;
      background: linear-gradient(135deg, #ffb347, var(--accent-2));
    }

    .btn-idea {
      color: white;
      background: linear-gradient(135deg, #22c1c3, #2ec4b6);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
    }

    .response,
    .idea-box {
      margin-top: 14px;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.4;
      text-align: center;
      font-weight: 700;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .response {
      background: rgba(255, 90, 95, 0.12);
      border: 1px dashed rgba(255, 90, 95, 0.45);
      color: #7a2730;
    }

    .idea-box {
      background: rgba(46, 196, 182, 0.14);
      border: 1px dashed rgba(46, 196, 182, 0.55);
      color: #0d635b;
      min-height: 49px;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .sign {
      margin-top: 18px;
      text-align: center;
      color: #80584a;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .floating-heart {
      position: fixed;
      bottom: -24px;
      z-index: 999;
      pointer-events: none;
      color: var(--accent);
      text-shadow: 0 8px 16px rgba(255, 90, 95, 0.35);
      animation: rise linear forwards;
    }

    @keyframes rise {
      from {
        transform: translateY(0) scale(0.7) rotate(0deg);
        opacity: 0.95;
      }
      to {
        transform: translateY(-110vh) scale(1.2) rotate(180deg);
        opacity: 0;
      }
    }

    @media (min-width: 640px) {
      .card {
        padding: 36px 32px;
      }

      .cta {
        grid-template-columns: 1fr 1fr;
      }

      .btn-idea {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <div class="blob a" aria-hidden="true"></div>
  <div class="blob b" aria-hidden="true"></div>
  <div class="blob c" aria-hidden="true"></div>

  <main class="card">
    <div class="seal" aria-hidden="true">&#10084;</div>
    <h1>Te invito a comer, <span class="name">mi amor</span></h1>
    <p class="subtitle">
      Porque contigo hasta el menu mas sencillo se vuelve mi plan favorito del dia.
    </p>

    <div class="chips" aria-hidden="true">
      <span class="chip">Tacos</span>
      <span class="chip">Sushi</span>
      <span class="chip">Hamburguesa</span>
      <span class="chip">Postre juntos</span>
    </div>

    <p class="hint">Fecha sugerida: <strong id="fecha"></strong></p>

    <section class="cta">
      <button class="btn btn-primary" id="btnSi">Si, vamos a nuestra cita</button>
      <button class="btn btn-secondary" id="btnAhora">Tengo hambre ahorita</button>
      <button class="btn btn-idea" id="btnIdea">Sorprendeme con un plan de comida</button>
    </section>

    <div class="response" id="respuesta"></div>
    <div class="idea-box" id="idea"></div>

    <p class="sign">Con amor, tu chef favorito.</p>
  </main>

  <script>
    const fechaEl = document.getElementById("fecha");
    const respuestaEl = document.getElementById("respuesta");
    const ideaEl = document.getElementById("idea");

    const planes = [
      "Plan 1: Tacos al pastor + agua fresca + caminata de la mano.",
      "Plan 2: Sushi date + postre compartido + foto juntos.",
      "Plan 3: Hamburguesas gourmet + papas + maraton de pelis.",
      "Plan 4: Pasta y cafe + platica larga + abrazo eterno.",
      "Plan 5: Antojitos y helado + atardecer + muchos besos."
    ];

    function fechaBonita() {
      const d = new Date();
      d.setDate(d.getDate() + 2);
      return d.toLocaleDateString("es-MX", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function lanzarCorazones() {
      for (let i = 0; i < 30; i += 1) {
        const h = document.createElement("span");
        h.className = "floating-heart";
        h.innerHTML = "&#10084;";
        h.style.left = `${Math.random() * 100}vw`;
        h.style.fontSize = `${14 + Math.random() * 20}px`;
        h.style.animationDuration = `${2.3 + Math.random() * 2.1}s`;
        h.style.opacity = `${0.55 + Math.random() * 0.4}`;
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4500);
      }
    }

    function mostrarRespuesta(texto) {
      respuestaEl.textContent = texto;
      respuestaEl.classList.add("show");
      lanzarCorazones();
    }

    document.getElementById("btnSi").addEventListener("click", () => {
      mostrarRespuesta("Perfecto, amor. Yo invito y tu solo trae tu sonrisa.");
    });

    document.getElementById("btnAhora").addEventListener("click", () => {
      mostrarRespuesta("Plan express activado: en 20 minutos salimos por algo delicioso.");
    });

    document.getElementById("btnIdea").addEventListener("click", () => {
      const plan = planes[Math.floor(Math.random() * planes.length)];
      ideaEl.textContent = plan;
      ideaEl.classList.add("show");
    });

    fechaEl.textContent = fechaBonita();
  </script>
</body>
</html>
